<!DOCTYPE html>
<!--
  AntiPhishing toolbar popup — read-only status of the on-device protection:
  whether the database exists, its version/size/age, and whether the master
  protection switch (owned by the app) is on. Database downloads/updates are
  managed from the AntiPhishing app, so the popup just reports and points
  the user there.
-->
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <script type="module" src="popup.js"></script>
</head>
<body>
    <header>
        <div id="shield" class="shield">🛡️</div>
        <h1>AntiPhishing</h1>
        <p id="status-text" class="status">Checking…</p>
    </header>

    <section class="info">
        <div class="info-row"><span>Protection database</span><strong id="db-state">–</strong></div>
        <div class="info-row"><span>Protected domains</span><strong id="db-count">–</strong></div>
        <div class="info-row"><span>Database version</span><strong id="db-version">–</strong></div>
        <div class="info-row"><span>Last updated</span><strong id="db-updated">–</strong></div>
    </section>

    <p class="hint" id="hint">
        Pages you open are checked on this device only — nothing is sent to a
        server. Manage updates and approved domains in the AntiPhishing app.
    </p>
</body>
</html>
